<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/contacto.css">
    <title>Contactos</title>
</head>
<body>

    <header class="header header--compact">
        <div class="menu container">
            <a href="index.html" class="logo">logo</a>
            <input type="checkbox" id="menu"/>
            <label for="menu">
                <img src="img/menu.png" class="menu-icono" alt="menu">
            </label>

            <nav class="navbar">
                <ul>
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="index.html#servicios">Servicios</a></li>
                    <li><a href="index.html#productos">Productos</a></li>
                    <li><a href="contacto.html">Contactos</a></li>
                </ul>
            </nav>

            <div>
                <ul>
                    <li class="submenu">
                        <img src="img/car.svg" id="img-carrito" alt="carrito">
                        <div id="carrito">
                            <table id="lista-carrito">
                                <thead>
                                    <tr>
                                        <th>Imagen</th>
                                        <th>Nombre</th>
                                        <th>Precio</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody></tbody>
                                <tfoot>
                                    <tr>
                                        <td colspan="2">Total:</td>
                                        <td id="total-carrito">$0</td>
                                        <td></td>
                                    </tr>
                                </tfoot>
                            </table>
                            <a href="#" class="btn-2" id="vaciar-carrito">Vaciar Carrito</a>
                        </div>
                    </li>
                </ul>
            </div>
        </div>
    </header>


    <div class="contact-wrapper">
        <div class="form-box">
            <h1 id="title">Contacto</h1>
            <p class="form-subtitle">¿Tenés dudas? Escribinos y te respondemos a la brevedad.</p>

            <form id="contactForm" novalidate>
                <div class="input-group">
                    <div class="input-field">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="contactName" placeholder="Nombre" required minlength="2">
                    </div>

                    <div class="input-field">
                        <i class="fa-solid fa-envelope"></i>
                        <input type="email" id="contactEmail" placeholder="Email" required>
                    </div>

                    <div class="input-field textarea-field">
                        <i class="fa-solid fa-comment"></i>
                        <textarea id="contactMessage" placeholder="Mensaje" required minlength="10"></textarea>
                    </div>
                </div>

                <p id="formError" class="form-error" hidden></p>
                <p id="formSuccess" class="form-success" hidden>
                    ¡Gracias! Tu mensaje fue enviado correctamente.
                </p>

                <div class="btn-field">
                    <button type="submit" id="sendBtn">Enviar mensaje</button>
                </div>
            </form>
        </div>
    </div>
    <script src="js/app.js"></script>
    <script src="js/contacto.js"></script>
</body>
</html>
