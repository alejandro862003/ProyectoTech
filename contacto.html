<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contactos</title>
</head>
<body>
    <form>
        <h2>Contactos</h2>
        <div class="input-group">
            <label for="name">Nombre:</label>
            <input type="text" id="name" name="name" placeholder="Ingrese su nombre">

            <label for="phone">Teléfono:</label>
            <input type="tel" id="phone" name="phone" placeholder="Ingrese su teléfono">

            <label for="email">Correo Electrónico:</label>
            <input type="email" id="email" name="email" placeholder="Ingrese su correo electrónico">

            <label for="message">Mensaje:</label>
            <textarea id="message" name="message" cols="30" rows="5" placeholder="Escriba su mensaje"></textarea>

            <input class="btn" type="submit" value="Enviar" >

        </div>
    </form>
</body>
</html>
